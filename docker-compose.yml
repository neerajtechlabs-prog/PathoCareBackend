services:
  postgres:
    image: postgres:16-alpine
    container_name: pathcare-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${DB_USER:-pathcare}
      POSTGRES_PASSWORD: ${DB_PASS:-localpass}
      POSTGRES_DB: ${DB_NAME:-pathcare_db}
      POSTGRES_INITDB_ARGS: '--encoding=UTF8 --locale=en_US.UTF-8'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-pathcare}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pathcare-network

  redis:
    image: redis:7-alpine
    container_name: pathcare-redis
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pathcare-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pathcare-api
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-pathcare}
      DB_PASS: ${DB_PASS:-localpass}
      DB_NAME: ${DB_NAME:-pathcare_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-change-in-prod}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-in-prod}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-.pathcare.local}
      API_PORT: 3001
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-pathcare-files-staging}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-dummy}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-dummy}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run start:dev
    networks:
      - pathcare-network

volumes:
  pgdata:
  redisdata:

networks:
  pathcare-network:
    driver: bridge
